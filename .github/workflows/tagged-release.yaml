---
name: "tagged-release"

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - "*"

permissions:
  attestations: write
  id-token: write
  contents: write

jobs:
  tagged-release:
    name: tagged-release
    runs-on: ubuntu-24.04
    env:
      CI_BRANCH: release
      PACKAGECLOUD_REPOSITORY: dokku/dokku
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Get Repository Name
        id: repo-name
        run: |
          echo "REPOSITORY_NAME=$(echo "${{ github.repository }}" | cut -d '/' -f 2)" >> $GITHUB_OUTPUT

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
          NAME: ${{ steps.repo-name.outputs.REPOSITORY_NAME }}
        run: |
          make build/darwin/${NAME}-amd64
          make build/darwin/${NAME}-arm64
          make build/linux/${NAME}-amd64
          make build/linux/${NAME}-arm64
          make build/windows/${NAME}-amd64.exe
          make build/windows/${NAME}-arm64.exe
          mkdir -p dist
          cp build/darwin/${NAME}-amd64       dist/${NAME}-darwin-amd64
          cp build/darwin/${NAME}-arm64       dist/${NAME}-darwin-arm64
          cp build/linux/${NAME}-amd64        dist/${NAME}-linux-amd64
          cp build/linux/${NAME}-arm64        dist/${NAME}-linux-arm64
          cp build/windows/${NAME}-amd64.exe  dist/${NAME}-windows-amd64.exe
          cp build/windows/${NAME}-arm64.exe  dist/${NAME}-windows-arm64.exe

      - name: Attest Build Provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-darwin-amd64
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-darwin-arm64
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-linux-amd64
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-linux-arm64
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-windows-amd64.exe
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-windows-arm64.exe

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: .github

      - name: Build Debian Packages
        run: |
          mkdir -p build/linux

          cp dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-linux-amd64 build/linux/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-amd64
          cp dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-linux-arm64 build/linux/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-arm64

          bundle exec make build/deb/${{ steps.repo-name.outputs.REPOSITORY_NAME }}_${{ github.ref_name }}_arm64.deb
          bundle exec make build/deb/${{ steps.repo-name.outputs.REPOSITORY_NAME }}_${{ github.ref_name }}_amd64.deb
          cp build/deb/*.deb dist/
        env:
          BUNDLE_GEMFILE: .github/Gemfile

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

      - name: Release to PackageCloud
        run: bundle exec make release-packagecloud
        env:
          BUNDLE_GEMFILE: .github/Gemfile
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          make_latest: "true"
